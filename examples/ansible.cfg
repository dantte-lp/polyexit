[defaults]
# Both files are loaded. hosts.local.yml is in .gitignore and contains
# real production overrides for ansible_host + public IPs; the committed
# hosts.yml carries RFC 5737 documentation placeholders. host_vars
# behave the same — *.local.yml is gitignored and merges over the base.
inventory          = inventory/hosts.yml,inventory/hosts.local.yml
roles_path         = roles
host_key_checking  = False
retry_files_enabled = False
forks              = 8
gathering          = smart
fact_caching       = jsonfile
fact_caching_connection = .ansible-facts
stdout_callback    = yaml
callbacks_enabled  = profile_tasks,timer
deprecation_warnings = False
interpreter_python = auto_silent
# Uncomment after creating ~/.ansible_vault_pass + inventory/group_vars/vault.yml
# vault_password_file = ~/.ansible_vault_pass

[ssh_connection]
pipelining         = True
control_path       = ~/.ssh/ansible-%%h-%%r
ssh_args           = -o ControlMaster=auto -o ControlPersist=300s -o ServerAliveInterval=30

[privilege_escalation]
become             = False
