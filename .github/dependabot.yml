version: 2
updates:
  # Keep GitHub Actions pinned to the latest stable.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: UTC
    open-pull-requests-limit: 4
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies
      - github-actions
